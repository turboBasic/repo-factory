name: Create Repository

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Copier template to use"
        required: true
        default: python-app
        type: choice
        options:
          - python-app
      repo_name:
        description: "New repository name (e.g. my-service)"
        required: true
        default: python-app-foo
        type: string
      description:
        description: "Short repository description (optional)"
        required: false
        type: string
        default: "Python application"
      github_org:
        description: "GitHub organisation to own the repository (optional). Leave empty to create under the workflow repository owner account."
        required: false
        type: string
        default: ""

jobs:
  create-repo:
    name: "Create ${{ inputs.repo_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      # Only needs to read this repository's contents.
      contents: read

    steps:
      - name: Checkout repo-factory
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Keep in sync with .mise.toml python version.
          python-version: "3.14"

      - name: Install Copier
        # Install as a uv tool so the `copier` binary is available on PATH.
        run: uv tool install "copier>=9"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          # Keep in sync with .mise.toml terraform version.
          terraform_version: "1.14.7"

      - name: Generate GitHub App token
        id: app-token
        # if: ${{ inputs.github_org != '' && inputs.github_org != github.repository_owner }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.REPO_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.REPO_AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ inputs.github_org != '' && inputs.github_org || github.repository_owner }}

      - name: Create repository
        env:
          IS_PERSONAL_OWNER: ${{ inputs.github_org == '' || inputs.github_org == github.repository_owner }}
          # Root-level Terraform variable for owner. Use workflow input if provided,
          # otherwise fall back to the repository owner that runs this workflow.
          TF_VAR_github_owner: ${{ inputs.github_org != '' && inputs.github_org || github.repository_owner }}
          # Attribute first commits to bot.
          GIT_AUTHOR_NAME: repo-factory[bot]
          GIT_AUTHOR_EMAIL: repo-factory[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: repo-factory[bot]
          GIT_COMMITTER_EMAIL: repo-factory[bot]@users.noreply.github.com
        run: |
          if [[ "${IS_PERSONAL_OWNER}" == "true" ]]; then
            # Personal owner path: GitHub App tokens cannot create /user/repos.
            export REPO_AUTOMATION_TOKEN="${{ secrets.REPO_AUTOMATION_PAT }}"
          else
            # Organisation path: use short-lived GitHub App installation token.
            export REPO_AUTOMATION_TOKEN="${{ steps.app-token.outputs.token }}"
          fi

          if [[ -z "${REPO_AUTOMATION_TOKEN}" ]]; then
            echo "ERROR: Repository automation token is empty." >&2
            exit 1
          fi

          bash scripts/create_repo.sh \
            "${{ inputs.template }}" \
            "${{ inputs.repo_name }}" \
            "${{ inputs.description }}"
