name: Create Repository

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Copier template to use"
        required: true
        default: python-app
        type: choice
        options:
          - python-app
      repo_name:
        description: "New repository name (e.g. my-service)"
        required: true
        default: python-app-foo
        type: string
      description:
        description: "Short repository description (optional)"
        required: false
        type: string
        default: "Python application"
      github_org:
        description: "GitHub organisation to own the repository (optional). Leave empty to create under the workflow repository owner account."
        required: false
        type: string
        default: ""

jobs:
  create-repo:
    name: "Create ${{ inputs.repo_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      # Only needs to read this repository's contents.
      contents: read

    steps:
      - name: Validate inputs and prepare environment
        shell: bash
        env:
          INPUT_TEMPLATE: ${{ inputs.template }}
          INPUT_REPO_NAME: ${{ inputs.repo_name }}
          INPUT_DESCRIPTION: ${{ inputs.description }}
          INPUT_GITHUB_ORG: ${{ inputs.github_org }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          fail() {
            echo "ERROR: $1" >&2
            exit 1
          }

          require_single_line() {
            local label="$1"
            local value="$2"
            if [[ "${value}" == *$'\n'* || "${value}" == *$'\r'* ]]; then
              fail "${label} must be a single line."
            fi
          }

          require_single_line "repo_name" "${INPUT_REPO_NAME}"
          require_single_line "description" "${INPUT_DESCRIPTION}"
          require_single_line "github_org" "${INPUT_GITHUB_ORG}"

          if [[ -z "${INPUT_REPO_NAME}" ]]; then
            fail "repo_name cannot be empty."
          fi
          if [[ "${#INPUT_REPO_NAME}" -gt 100 ]]; then
            fail "repo_name must be 100 characters or fewer."
          fi
          if [[ ! "${INPUT_REPO_NAME}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            fail "repo_name must contain only letters, numbers, dot, underscore, or hyphen."
          fi

          github_owner="${INPUT_GITHUB_ORG:-${REPOSITORY_OWNER}}"
          is_personal_owner="false"
          if [[ "${github_owner}" == "${REPOSITORY_OWNER}" ]]; then
            is_personal_owner="true"
          fi

          {
            echo "INPUT_TEMPLATE=${INPUT_TEMPLATE}"
            echo "INPUT_REPO_NAME=${INPUT_REPO_NAME}"
            echo "INPUT_DESCRIPTION<<__DESCRIPTION__"
            printf '%s\n' "${INPUT_DESCRIPTION}"
            echo "__DESCRIPTION__"
            echo "IS_PERSONAL_OWNER=${is_personal_owner}"
            echo "TF_VAR_github_owner=${github_owner}"
          } >> "${GITHUB_ENV}"

      - name: Checkout repo-factory
        uses: actions/checkout@v6

      - name: Generate GitHub App token
        id: app-token
        if: ${{ inputs.github_org != '' && inputs.github_org != github.repository_owner }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.REPO_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.REPO_AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ inputs.github_org != '' && inputs.github_org || github.repository_owner }}

      - name: Resolve and validate automation token
        shell: bash
        env:
          PERSONAL_TOKEN: ${{ secrets.REPO_AUTOMATION_PAT }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ "${IS_PERSONAL_OWNER}" == "true" ]]; then
            token="${PERSONAL_TOKEN:-}"
          else
            token="${APP_TOKEN:-}"
          fi

          if [[ -z "${token}" ]]; then
            echo "ERROR: Repository automation token is empty." >&2
            exit 1
          fi

          echo "::add-mask::${token}"
          {
            echo "REPO_AUTOMATION_TOKEN<<__TOKEN__"
            printf '%s\n' "${token}"
            echo "__TOKEN__"
          } >> "${GITHUB_ENV}"

      - name: Set up Mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.9

      - name: Install Python dependencies
        # Install pyproject dependencies using the uv version managed by Mise.
        run: mise exec -- uv sync

      - name: Create repository
        env:
          # Attribute first commits to bot.
          GIT_AUTHOR_NAME: repo-factory[bot]
          GIT_AUTHOR_EMAIL: repo-factory[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: repo-factory[bot]
          GIT_COMMITTER_EMAIL: repo-factory[bot]@users.noreply.github.com
        run: |
          set -euo pipefail

          mise exec -- uv run --no-sync bash scripts/create_repo.sh \
            "${INPUT_TEMPLATE}" \
            "${INPUT_REPO_NAME}" \
            "${INPUT_DESCRIPTION}"
